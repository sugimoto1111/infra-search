<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>代行不可検索ダッシュボード</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#F0F2F5; --surface:#FFF; --border:#D8DDE6;
    --text:#1A1D23; --muted:#7A8294; --sub:#B0B6C4;
    --elec:#D97706; --elec-bg:#FEF3C7;
    --gas:#DC2626;  --gas-bg:#FEE2E2;
    --wtr:#2563EB;  --wtr-bg:#DBEAFE;
    --hit:#059669;  --hit-bg:#ECFDF5; --hit-br:#6EE7B7;
    --miss:#DC2626; --miss-bg:#FEF2F2; --miss-br:#FECACA;
    --warn:#D97706; --warn-bg:#FFFBEB; --warn-br:#FDE68A;
    --info:#2563EB; --info-bg:#EFF6FF; --info-br:#BFDBFE;
    --other:#8b5cf6; --other-bg:#f5f3ff; --other-br:#c4b5fd;
    --cond:#7c3aed; --cond-bg:#f5f3ff; --cond-br:#c4b5fd;
    --na:#6b7280;
    --sh:0 2px 8px rgba(0,0,0,.07),0 0 1px rgba(0,0,0,.08);
    --r:13px;
  }
  [data-dark] {
    --bg:#111318; --surface:#1C1F27; --border:#2C303C;
    --text:#E4E6EE; --muted:#5C6278; --sub:#3A3D4E;
    --elec-bg:#1C1300; --gas-bg:#1C0404; --wtr-bg:#040E24;
    --hit-bg:#022C1A; --hit-br:#065F46;
    --miss-bg:#1C0404; --miss-br:#7F1D1D;
    --warn-bg:#1C1300; --warn-br:#92400E;
    --info-bg:#0C1929; --info-br:#1E40AF;
    --other-bg:#1a1033; --other-br:#5b21b6;
    --cond-bg:#1a1033; --cond-br:#5b21b6;
    --sh:0 2px 8px rgba(0,0,0,.3),0 0 1px rgba(0,0,0,.4);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;transition:background .2s,color .2s}

  .lock-screen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;transition:opacity .3s}
  .lock-screen.hidden{opacity:0;pointer-events:none}
  .lock-box{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;padding:36px 32px;width:380px;max-width:90vw;box-shadow:0 12px 40px rgba(0,0,0,.12);text-align:center}
  .lock-icon{font-size:40px;margin-bottom:12px}
  .lock-title{font-size:18px;font-weight:700;margin-bottom:4px}
  .lock-sub{font-size:12px;color:var(--muted);margin-bottom:20px}
  .lock-input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;background:var(--bg);color:var(--text);outline:none;text-align:center;font-family:'DM Mono',monospace;letter-spacing:.05em;transition:border-color .15s}
  .lock-input:focus{border-color:var(--wtr);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
  .lock-btn{width:100%;padding:11px;border:none;border-radius:8px;background:var(--wtr);color:#fff;font-size:14px;font-weight:600;cursor:pointer;margin-top:12px;font-family:'Noto Sans JP',sans-serif;transition:opacity .15s}
  .lock-btn:hover{opacity:.85}
  .lock-error{color:var(--miss);font-size:12px;margin-top:10px;min-height:18px;font-weight:500}

  .app{display:none}
  .app.visible{display:flex;flex-direction:column;height:100vh}

  .topbar{height:46px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:10px;position:sticky;top:0;z-index:50;box-shadow:var(--sh);flex-shrink:0}
  .topbar-title{font-weight:700;font-size:14px;letter-spacing:-.01em;flex:1}
  .status-dot{width:8px;height:8px;border-radius:50%;background:#aaa;margin-right:4px;flex-shrink:0}
  .status-dot.ok{background:#22c55e;box-shadow:0 0 6px rgba(34,197,94,.4)}
  .status-dot.ng{background:#ef4444}
  .status-dot.loading{background:#f59e0b;animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .status-text{font-size:11px;color:var(--muted);margin-right:12px}
  .reload-btn{font-size:10px;color:var(--wtr);background:var(--info-bg);border:1px solid var(--info-br);border-radius:5px;padding:3px 9px;cursor:pointer;display:none;margin-right:4px}
  .reload-btn.show{display:inline-block}
  .dk-wrap{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);cursor:pointer;user-select:none}
  .dk-track{width:38px;height:21px;background:var(--border);border-radius:11px;position:relative;transition:background .2s;flex-shrink:0}
  [data-dark] .dk-track{background:var(--wtr)}
  .dk-thumb{width:15px;height:15px;background:#fff;border-radius:50%;position:absolute;top:3px;left:3px;transition:transform .2s cubic-bezier(.34,1.56,.64,1);box-shadow:0 1px 3px rgba(0,0,0,.2)}
  [data-dark] .dk-thumb{transform:translateX(17px)}

  .pc-grid{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:auto 1fr;gap:12px;padding:14px;flex:1;overflow:hidden}
  .card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;transition:background .2s,border-color .2s}
  .card-search{display:flex;flex-direction:column;gap:10px;padding:13px 15px;grid-row:1}
  .card-result{grid-row:2;overflow-y:auto}

  .sh{display:flex;align-items:center;gap:8px}
  .ic{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
  .elec .ic{background:var(--elec-bg)} .gas .ic{background:var(--gas-bg)} .wtr .ic{background:var(--wtr-bg)}
  .lbl{font-weight:700;font-size:14px}
  .elec .lbl{color:var(--elec)} .gas .lbl{color:var(--gas)} .wtr .lbl{color:var(--wtr)}

  .irow{display:flex;align-items:center;border:1.5px solid var(--border);border-radius:8px;overflow:hidden;background:var(--bg);transition:border-color .15s,box-shadow .15s}
  .elec .irow:focus-within{border-color:var(--elec);box-shadow:0 0 0 3px rgba(217,119,6,.12)}
  .gas  .irow:focus-within{border-color:var(--gas);box-shadow:0 0 0 3px rgba(220,38,38,.12)}
  .wtr  .irow:focus-within{border-color:var(--wtr);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
  .pi{flex:1;border:none;outline:none;background:transparent;padding:9px 11px;font-family:'DM Mono',monospace;font-size:14px;color:var(--text);letter-spacing:.04em;min-width:0}
  .pi::placeholder{font-family:'Noto Sans JP',sans-serif;font-size:12px;color:var(--sub);letter-spacing:0}
  .cb{border:none;background:transparent;color:var(--sub);font-size:16px;cursor:pointer;padding:0 8px;line-height:1;display:none;transition:color .15s}
  .cb:hover{color:var(--text)}
  .cb.show{display:block}
  .sb{border:none;padding:9px 13px;cursor:pointer;font-size:12px;font-family:'Noto Sans JP',sans-serif;font-weight:500;color:#fff;white-space:nowrap;flex-shrink:0;transition:opacity .15s}
  .sb:hover:not(:disabled){opacity:.85}
  .elec .sb{background:var(--elec)} .gas .sb{background:var(--gas)} .wtr .sb{background:var(--wtr)}

  .s-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:7px;color:var(--sub);padding:20px}
  .s-empty-ico{font-size:30px;opacity:.25}
  .s-empty-txt{font-size:12px;letter-spacing:.04em}
  .s-load{display:flex;align-items:center;justify-content:center;height:100%;gap:5px}
  .dot{width:7px;height:7px;border-radius:50%;animation:db 1.1s ease-in-out infinite}
  .elec-r .dot{background:var(--elec)} .gas-r .dot{background:var(--gas)} .wtr-r .dot{background:var(--wtr)}
  .dot:nth-child(2){animation-delay:.18s} .dot:nth-child(3){animation-delay:.36s}
  @keyframes db{0%,80%,100%{transform:scale(.7);opacity:.35}40%{transform:scale(1.3);opacity:1}}

  .ri{padding:16px 18px;animation:fu .25s ease}
  @keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
  .rphrow{display:flex;align-items:center;gap:9px;margin-bottom:14px;flex-wrap:wrap}
  .rph{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;letter-spacing:.04em}
  .badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;border:1px solid}
  .b-hit{background:var(--hit-bg);color:var(--hit);border-color:var(--hit-br)}
  .b-miss{background:var(--miss-bg);color:var(--miss);border-color:var(--miss-br)}
  .b-other{background:var(--other-bg);color:var(--other);border-color:var(--other-br)}

  .result-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-top:10px}
  .rc-row{display:flex;gap:16px;margin-bottom:12px}
  .rc-row:last-child{margin-bottom:0}
  .rc-item{flex:1}
  .rc-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
  .rc-value{font-size:13px;color:var(--text);line-height:1.6}
  .rc-value.v-ok{color:var(--hit);font-weight:700}
  .rc-value.v-ng{color:var(--miss);font-weight:700}
  .rc-value.v-cond{color:var(--cond);font-weight:700}
  .rc-value.v-na{color:var(--na);font-weight:500}
  .rc-value.v-empty{color:var(--sub);font-style:italic}
  .rc-full{margin-bottom:12px}
  .rc-full:last-child{margin-bottom:0}

  .alert{border-radius:8px;padding:14px 16px;margin-top:10px;font-size:12.5px;line-height:1.7;border:1px solid}
  .alert-warn{background:var(--warn-bg);border-color:var(--warn-br);color:var(--warn)}
  .alert-info{background:var(--info-bg);border-color:var(--info-br);color:var(--info)}
  .alert-other{background:var(--other-bg);border-color:var(--other-br);color:var(--other)}
  .alert a{color:var(--wtr);font-weight:600;text-decoration:underline}
  .alert a:hover{opacity:.8}
  .miss-msg{font-size:13px;color:var(--muted);margin-top:6px}

  .sp-view{display:none;flex-direction:column;flex:1;overflow:hidden}
  .sp-tabs{display:flex;background:var(--surface);border-bottom:2px solid var(--border);flex-shrink:0}
  .sp-tab{flex:1;padding:12px 0;text-align:center;font-size:14px;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;color:var(--muted);background:none;border-top:none;border-left:none;border-right:none}
  .sp-tab.active-elec{color:var(--elec);border-bottom-color:var(--elec);background:var(--elec-bg)}
  .sp-tab.active-gas{color:var(--gas);border-bottom-color:var(--gas);background:var(--gas-bg)}
  .sp-tab.active-wtr{color:var(--wtr);border-bottom-color:var(--wtr);background:var(--wtr-bg)}
  .sp-panel{flex:1;display:none;flex-direction:column;overflow:hidden}
  .sp-panel.active{display:flex}
  .sp-search{padding:14px 16px;flex-shrink:0}
  .sp-search .irow{margin-top:10px}
  .sp-result{flex:1;overflow-y:auto;padding:0 4px}
  .sp-result .ri{padding:14px 14px}
  .sp-result .s-empty{padding:40px 20px}
  .sp-result .s-empty-ico{font-size:36px}
  .sp-result .result-card{padding:16px 18px}
  .sp-result .rc-value{font-size:14px}
  .sp-result .rph{font-size:17px}
  .sp-result .badge{font-size:12px;padding:4px 10px}
  .sp-result .alert{font-size:13.5px;padding:16px 18px}
  .sp-result .miss-msg{font-size:14px}

  @media(max-width:768px){
    .pc-grid{display:none!important}
    .sp-view{display:flex!important}
    .topbar-title{font-size:13px}
    .status-text{display:none}
    .topbar{padding:0 12px;height:42px}
  }
  @media(min-width:769px){
    .sp-view{display:none!important}
    .pc-grid{display:grid!important}
  }
</style>
</head>
<body>

<div class="lock-screen" id="lockScreen">
  <div class="lock-box">
    <div class="lock-icon">🔒</div>
    <div class="lock-title">代行不可検索ダッシュボード</div>
    <div class="lock-sub">アクセスするにはパスワードを入力してください</div>
    <input type="password" class="lock-input" id="lockInput" placeholder="パスワード"
      onkeydown="if(event.key==='Enter')unlock()">
    <button class="lock-btn" onclick="unlock()">ログイン</button>
    <div class="lock-error" id="lockError"></div>
  </div>
</div>

<div class="app" id="app">

<header class="topbar">
  <span class="topbar-title">📋 代行不可検索ダッシュボード</span>
  <div class="status-dot loading" id="st-dot"></div>
  <span class="status-text" id="st-text">読み込み中…</span>
  <button class="reload-btn" id="reloadBtn" onclick="retryLoad()">🔄 再読込</button>
  <div class="dk-wrap" onclick="toggleDark()">
    <span>☀</span>
    <div class="dk-track"><div class="dk-thumb"></div></div>
    <span>🌙</span>
  </div>
</header>

<!-- PC版 -->
<div class="pc-grid">
  <div class="card card-search elec">
    <div class="sh"><div class="ic">⚡</div><span class="lbl">電気</span></div>
    <div class="irow">
      <input class="pi" id="q-elec" type="tel" maxlength="13" placeholder="電話番号を入力（10〜11桁）"
        oninput="toggleClear('q-elec','c-elec')" onkeydown="if(event.key==='Enter')go('elec')">
      <button class="cb" id="c-elec" onclick="clearInput('q-elec','c-elec','r-elec','elec')">×</button>
      <button class="sb" onclick="go('elec')">検索</button>
    </div>
  </div>
  <div class="card card-search gas">
    <div class="sh"><div class="ic">🔥</div><span class="lbl">ガス</span></div>
    <div class="irow">
      <input class="pi" id="q-gas" type="tel" maxlength="13" placeholder="電話番号を入力（10〜11桁）"
        oninput="toggleClear('q-gas','c-gas')" onkeydown="if(event.key==='Enter')go('gas')">
      <button class="cb" id="c-gas" onclick="clearInput('q-gas','c-gas','r-gas','gas')">×</button>
      <button class="sb" onclick="go('gas')">検索</button>
    </div>
  </div>
  <div class="card card-search wtr">
    <div class="sh"><div class="ic">💧</div><span class="lbl">水道</span></div>
    <div class="irow">
      <input class="pi" id="q-wtr" type="tel" maxlength="13" placeholder="電話番号を入力（10〜11桁）"
        oninput="toggleClear('q-wtr','c-wtr')" onkeydown="if(event.key==='Enter')go('wtr')">
      <button class="cb" id="c-wtr" onclick="clearInput('q-wtr','c-wtr','r-wtr','wtr')">×</button>
      <button class="sb" onclick="go('wtr')">検索</button>
    </div>
  </div>
  <div class="card card-result" id="r-elec">
    <div class="s-empty"><div class="s-empty-ico">⚡</div><div class="s-empty-txt">電話番号を入力して検索</div></div>
  </div>
  <div class="card card-result" id="r-gas">
    <div class="s-empty"><div class="s-empty-ico">🔥</div><div class="s-empty-txt">電話番号を入力して検索</div></div>
  </div>
  <div class="card card-result" id="r-wtr">
    <div class="s-empty"><div class="s-empty-ico">💧</div><div class="s-empty-txt">電話番号を入力して検索</div></div>
  </div>
</div>

<!-- スマホ版 -->
<div class="sp-view">
  <div class="sp-tabs">
    <button class="sp-tab active-elec" id="tab-elec" onclick="switchTab('elec')">⚡ 電気</button>
    <button class="sp-tab" id="tab-gas" onclick="switchTab('gas')">🔥 ガス</button>
    <button class="sp-tab" id="tab-wtr" onclick="switchTab('wtr')">💧 水道</button>
  </div>
  <div class="sp-panel active" id="sp-elec">
    <div class="sp-search elec">
      <div class="sh"><div class="ic">⚡</div><span class="lbl">電気</span></div>
      <div class="irow">
        <input class="pi" id="sq-elec" type="tel" maxlength="13" placeholder="電話番号を入力（10〜11桁）"
          oninput="toggleClear('sq-elec','sc-elec')" onkeydown="if(event.key==='Enter')goSp('elec')">
        <button class="cb" id="sc-elec" onclick="clearInput('sq-elec','sc-elec','sr-elec','elec')">×</button>
        <button class="sb" onclick="goSp('elec')">検索</button>
      </div>
    </div>
    <div class="sp-result" id="sr-elec">
      <div class="s-empty"><div class="s-empty-ico">⚡</div><div class="s-empty-txt">電話番号を入力して検索</div></div>
    </div>
  </div>
  <div class="sp-panel" id="sp-gas">
    <div class="sp-search gas">
      <div class="sh"><div class="ic">🔥</div><span class="lbl">ガス</span></div>
      <div class="irow">
        <input class="pi" id="sq-gas" type="tel" maxlength="13" placeholder="電話番号を入力（10〜11桁）"
          oninput="toggleClear('sq-gas','sc-gas')" onkeydown="if(event.key==='Enter')goSp('gas')">
        <button class="cb" id="sc-gas" onclick="clearInput('sq-gas','sc-gas','sr-gas','gas')">×</button>
        <button class="sb" onclick="goSp('gas')">検索</button>
      </div>
    </div>
    <div class="sp-result" id="sr-gas">
      <div class="s-empty"><div class="s-empty-ico">🔥</div><div class="s-empty-txt">電話番号を入力して検索</div></div>
    </div>
  </div>
  <div class="sp-panel" id="sp-wtr">
    <div class="sp-search wtr">
      <div class="sh"><div class="ic">💧</div><span class="lbl">水道</span></div>
      <div class="irow">
        <input class="pi" id="sq-wtr" type="tel" maxlength="13" placeholder="電話番号を入力（10〜11桁）"
          oninput="toggleClear('sq-wtr','sc-wtr')" onkeydown="if(event.key==='Enter')goSp('wtr')">
        <button class="cb" id="sc-wtr" onclick="clearInput('sq-wtr','sc-wtr','sr-wtr','wtr')">×</button>
        <button class="sb" onclick="goSp('wtr')">検索</button>
      </div>
    </div>
    <div class="sp-result" id="sr-wtr">
      <div class="s-empty"><div class="s-empty-ico">💧</div><div class="s-empty-txt">電話番号を入力して検索</div></div>
    </div>
  </div>
</div>

</div>

<script>
/* ====== パスワード ====== */
var PASS='intern@estate';
var AUTH_KEY='infraDash_auth';

function unlock(){
  var input=document.getElementById('lockInput');
  var error=document.getElementById('lockError');
  if(input.value===PASS){
    sessionStorage.setItem(AUTH_KEY,'1');
    document.getElementById('lockScreen').classList.add('hidden');
    document.getElementById('app').classList.add('visible');
    loadData();
  }else{
    error.textContent='パスワードが正しくありません';
    input.value='';input.focus();
  }
}
(function checkAuth(){
  if(sessionStorage.getItem(AUTH_KEY)==='1'){
    document.getElementById('lockScreen').classList.add('hidden');
    document.getElementById('app').classList.add('visible');
    loadData();
  }else{
    setTimeout(function(){document.getElementById('lockInput').focus();},100);
  }
})();

/* ====== クリアボタン ====== */
function toggleClear(inputId,btnId){
  var val=document.getElementById(inputId).value;
  document.getElementById(btnId).className='cb'+(val?' show':'');
}

function clearInput(inputId,btnId,resultId,panel){
  var input=document.getElementById(inputId);
  input.value='';
  input.focus();
  document.getElementById(btnId).className='cb';
  var ico=panel==='elec'?'⚡':panel==='gas'?'🔥':'💧';
  document.getElementById(resultId).innerHTML='<div class="s-empty"><div class="s-empty-ico">'+ico+'</div><div class="s-empty-txt">電話番号を入力して検索</div></div>';
}

/* ====== タブ切替 ====== */
function switchTab(panel){
  ['elec','gas','wtr'].forEach(function(p){
    document.getElementById('sp-'+p).classList.remove('active');
    document.getElementById('tab-'+p).className='sp-tab';
  });
  document.getElementById('sp-'+panel).classList.add('active');
  document.getElementById('tab-'+panel).className='sp-tab active-'+panel;
}

/* ====== 設定 ====== */
var SHEET_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vQKSJF2qsdE6kZWUTqpKFbbdpmFggSOWIx4B1qr2dyj3z3VXs1c3FfYZbiYcJpM93YW9lTLbNfWktwh/pub?gid=0&single=true&output=csv';
var FORM_URL='#';
var COL={id:'管理ID',phone:'検索用番号',disp:'表示用番号',infra:'インフラ種別',dest:'手配先名称',area:'地域名',proxy:'代行判定',note:'備考'};
var INFRA_MAP={elec:'電気',gas:'ガス',wtr:'水道'};
var INFRA_ICON={'電気':'⚡','ガス':'🔥','水道':'💧'};
var DATA=[];
var isLoading=false;

/* ====== ダークモード ====== */
(function(){if(localStorage.getItem('dk')==='1')document.documentElement.setAttribute('data-dark','');})();
function toggleDark(){var on=document.documentElement.toggleAttribute('data-dark');localStorage.setItem('dk',on?'1':'');}

/* ====== ステータス ====== */
function updateStatus(type,msg){
  document.getElementById('st-dot').className='status-dot '+type;
  document.getElementById('st-text').textContent=msg;
  document.getElementById('reloadBtn').className='reload-btn'+(type==='ng'?' show':'');
}

/* ====== CSV読込 ====== */
function loadData(){
  if(isLoading)return;
  if(DATA.length>0){updateStatus('ok',DATA.length+'件 読込済');return;}
  isLoading=true;
  updateStatus('loading','データ読み込み中…');
  var url=SHEET_URL+'&t='+Date.now();
  fetch(url).then(function(res){
    if(!res.ok)throw new Error('HTTP '+res.status);
    return res.text();
  }).then(function(text){
    DATA=parseCSV(text);
    if(DATA.length===0)throw new Error('データが0件です');
    isLoading=false;
    updateStatus('ok',DATA.length+'件 読込済');
  }).catch(function(e){
    isLoading=false;
    updateStatus('ng','読込失敗: '+e.message);
    if(!loadData.retry)loadData.retry=0;
    loadData.retry++;
    if(loadData.retry<=3){setTimeout(function(){loadData();},3000);}
  });
}
function retryLoad(){loadData.retry=0;DATA=[];loadData();}

function parseCSV(t){
  var ls=t.trim().split(/\r?\n/);if(ls.length<2)return[];
  var hs=splitCSV(ls[0]).map(function(h){return h.replace(/^\uFEFF/,'').trim();});
  return ls.slice(1).filter(function(l){return l.trim();}).map(function(l){
    var vs=splitCSV(l);var o={};
    hs.forEach(function(h,i){o[h]=(vs[i]||'').trim();});
    return o;
  });
}
function splitCSV(line){
  var r=[];var c='';var q=false;
  for(var i=0;i<line.length;i++){var ch=line[i];if(ch==='"')q=!q;else if(ch===','&&!q){r.push(c);c='';}else c+=ch;}
  r.push(c);return r;
}

/* ====== ユーティリティ ====== */
function digits(s){return(s||'').replace(/[^\d]/g,'');}
function formatPhone(d){
  if(d.length===11)return d.slice(0,3)+'-'+d.slice(3,7)+'-'+d.slice(7);
  if(d.length===10)return d.slice(0,3)+'-'+d.slice(3,6)+'-'+d.slice(6);
  return d;
}
function validate(raw){
  var d=digits(raw);
  if(d.length<10||d.length>11)return{ok:false,msg:'電話番号は10桁または11桁で入力してください（現在: '+d.length+'桁）'};
  return{ok:true,digits:d};
}
function proxyClass(val){
  if(/○|可/.test(val)&&!/不可|×|条件/.test(val))return 'v-ok';
  if(/×|不可/.test(val))return 'v-ng';
  if(/△|条件/.test(val))return 'v-cond';
  if(val==='-'||val===''||val==='—')return 'v-na';
  return '';
}
function matchInfra(ri,it){return(ri||'').indexOf(it)!==-1;}
function findOtherInfra(query,cur){
  var others=[];
  ['電気','ガス','水道'].forEach(function(inf){
    if(inf===cur)return;
    var found=false;
    for(var i=0;i<DATA.length;i++){
      if(matchInfra((DATA[i][COL.infra]||'').trim(),inf)&&digits(DATA[i][COL.phone])===query){found=true;break;}
    }
    if(found)others.push(inf);
  });
  return others;
}

/* ====== 検索 ====== */
function go(panel){search(panel,document.getElementById('q-'+panel).value.trim(),document.getElementById('r-'+panel));}
function goSp(panel){search(panel,document.getElementById('sq-'+panel).value.trim(),document.getElementById('sr-'+panel));}

function search(panel,raw,el){
  var ico=panel==='elec'?'⚡':panel==='gas'?'🔥':'💧';
  if(!raw){el.innerHTML='<div class="s-empty"><div class="s-empty-ico">'+ico+'</div><div class="s-empty-txt">電話番号を入力して検索</div></div>';return;}
  var v=validate(raw);
  if(!v.ok){el.innerHTML='<div class="ri"><div class="alert alert-warn">⚠ '+v.msg+'</div></div>';return;}
  if(DATA.length===0){el.innerHTML='<div class="ri"><div class="alert alert-warn">⚠ データが読み込まれていません。ヘッダーの「🔄 再読込」ボタンを押すか、ページを再読み込みしてください。</div></div>';return;}
  el.innerHTML='<div class="s-load '+panel+'-r"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  setTimeout(function(){
    var query=v.digits;var infraType=INFRA_MAP[panel];
    var hits=[];
    for(var i=0;i<DATA.length;i++){
      if(!matchInfra((DATA[i][COL.infra]||'').trim(),infraType))continue;
      if(digits(DATA[i][COL.phone])===query)hits.push(DATA[i]);
    }
    if(hits.length>0)renderHits(el,query,hits);
    else{var others=findOtherInfra(query,infraType);if(others.length>0)renderOtherInfra(el,raw,others);else renderMiss(el,raw);}
  },200);
}

/* ====== 表示 ====== */
function renderHits(el,query,hits){
  var cards='';
  for(var i=0;i<hits.length;i++){
    var r=hits[i];var proxy=(r[COL.proxy]||'').trim();var cls=proxyClass(proxy);
    var note=r[COL.note]||'';var dest=r[COL.dest]||'';var area=r[COL.area]||'';var infra=(r[COL.infra]||'').trim();
    cards+='<div class="result-card">'+
      '<div class="rc-row"><div class="rc-item"><div class="rc-label">インフラ種別</div><div class="rc-value">'+infra+'</div></div>'+
      '<div class="rc-item"><div class="rc-label">代行判定</div><div class="rc-value '+cls+'">'+(proxy||'—')+'</div></div></div>'+
      '<div class="rc-full"><div class="rc-label">備考</div><div class="rc-value'+(note?'':' v-empty')+'">'+(note||'なし')+'</div></div>'+
      '<div class="rc-full"><div class="rc-label">手配先名称</div><div class="rc-value">'+(dest||'—')+'</div></div>'+
      '<div class="rc-full"><div class="rc-label">地域名</div><div class="rc-value">'+(area||'—')+'</div></div></div>';
  }
  el.innerHTML='<div class="ri"><div class="rphrow"><span class="rph">'+formatPhone(query)+'</span><span class="badge b-hit">✓ 登録あり</span></div>'+cards+'</div>';
}

function renderOtherInfra(el,raw,others){
  var otherNames='';var otherPanels='';
  for(var i=0;i<others.length;i++){
    if(i>0){otherNames+='・';otherPanels+='・';}
    otherNames+=INFRA_ICON[others[i]]+' '+others[i];
    otherPanels+='<strong>'+others[i]+'</strong>';
  }
  el.innerHTML='<div class="ri"><div class="rphrow"><span class="rph">'+raw+'</span><span class="badge b-other">↗ 別カテゴリで登録あり</span></div>'+
    '<div class="alert alert-other">🔍 この番号は '+otherNames+' で登録されています。<br>'+otherPanels+' の検索欄で再度検索してください。</div></div>';
}

function renderMiss(el,raw){
  el.innerHTML='<div class="ri"><div class="rphrow"><span class="rph">'+raw+'</span><span class="badge b-miss">✕ 未登録</span></div>'+
    '<div class="miss-msg">この電話番号はどのインフラにも登録されていません。</div>'+
    '<div class="alert alert-info" style="margin-top:14px">📝 代行は「<strong>可能</strong>」です。<br>代行を希望の場合は <a href="'+FORM_URL+'" target="_blank">Google フォーム</a> より申請お願いします。</div></div>';
}
</script>
